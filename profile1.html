<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Profile - Arts101.HK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="profile-page-body">

    <!-- STICKY TOP HEADER -->
    <header class="main-header">
        <div class="logo-area">
            <div class="profile-avatar">
                <img src="icon.jpg" alt="Arts101 Logo" onerror="this.style.display='none';">
            </div>
            <a href="index.html" class="logo-text" style="text-decoration: none; color: inherit;">Arts101.HK</a>
        </div>
        <nav class="social-area">
            <a href="index.html" style="color: var(--text-main);">← Back to Team</a>
        </nav>
    </header>

    <main class="profile-hero-section">
        
        <!-- MAIN PROFILE HERO CONTAINER -->
        <div class="profile-content-container">
            
            <!-- LEFT: CIRCULAR AVATAR WITH DOUBLE RING -->
            <div class="profile-avatar-wrapper">
                <div class="profile-avatar-circle">
                    <img src="picture_red01.jpg" alt="Profile Avatar" class="avatar-img" onerror="this.style.display='none';">
                </div>
            </div>

            <!-- RIGHT: BIO & DETAILS -->
            <div class="profile-text-wrapper">
                <span class="profile-role-tag">CREATIVE ILLUSTRATOR</span>
                <h1 class="profile-name">I'M <span class="highlight-text">NAME 1</span></h1>
                <p class="profile-bio">
                    Exploring stream-of-consciousness sketches, classical architectural structures, and dynamic brushwork. Passionate about mixed media and digital concept art.
                </p>

                <!-- INSTAGRAM LINK CHIP -->
                <div class="profile-social-container">
                    <a href="https://instagram.com/your_handle_here" target="_blank" rel="noopener noreferrer" class="instagram-chip">
                        <svg class="instagram-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
                            <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
                            <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
                        </svg>
                        <span>@artist_handle</span>
                    </a>
                </div>

                <!-- HORIZONTALLY SCROLLABLE ARTWORK CAROUSEL -->
                <div class="profile-gallery-wrapper">
                    <h3 class="gallery-label">FEATURED WORKS</h3>
                    <div class="horizontal-scroll-container">
                        <div class="scroll-item" onclick="openLightbox('picture_red01.jpg')">
                            <img src="picture_red01.jpg" alt="Artwork 1">
                        </div>
                        <div class="scroll-item" onclick="openLightbox('picture_red02.jpg')">
                            <img src="picture_red02.jpg" alt="Artwork 2">
                        </div>
                        <div class="scroll-item" onclick="openLightbox('picture_red03.jpg')">
                            <img src="picture_red03.jpg" alt="Artwork 3">
                        </div>
                        <div class="scroll-item" onclick="openLightbox('picture_red04.jpg')">
                            <img src="picture_red04.jpg" alt="Artwork 4">
                        </div>
                        <div class="scroll-item" onclick="openLightbox('picture_red05.jpg')">
                            <img src="picture_red05.jpg" alt="Artwork 5">
                        </div>
                    </div>
                </div>

            </div>

        </div>

    </main>

    <!-- FULLSCREEN MAGNIFY LIGHTBOX MODAL -->
    <div id="lightbox" class="lightbox-modal" onclick="closeLightbox()">
        <span class="lightbox-close">&times;</span>
        <img class="lightbox-content" id="lightbox-img" alt="Magnified View">
    </div>

    <script src="script.js"></script>
</body>
</html>
