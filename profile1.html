<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Profile - Arts101.HK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-profile-body">

    <!-- STICKY TOP HEADER -->
    <header class="main-header">
        <div class="logo-area">
            <div class="profile-avatar">
                <img src="icon.jpg" alt="Arts101 Logo" onerror="this.style.display='none';">
            </div>
            <a href="index.html" class="logo-text" style="text-decoration: none; color: inherit;">Arts101.HK</a>
        </div>
        <nav class="social-area">
            <a href="index.html" style="color: var(--text-main);">← Back to Team</a>
        </nav>
    </header>

    <main class="detail-page-container">
        
        <!-- PROFILE HEADER CARD -->
        <section class="profile-hero-card">
            <div class="profile-large-avatar">P1</div>
            <h1 class="detail-title">Artist Name</h1>
            <p class="profile-role">Lead Illustrator & Concept Designer</p>
            <p class="detail-subtitle" style="max-width: 600px; margin: 16px auto 0;">
                Focusing on classical architectural structures, fluid pen doodles, and emotional character portraiture.
            </p>
            <div class="profile-socials">
                <a href="#" class="profile-link">Instagram</a>
                <a href="#" class="profile-link">Portfolio</a>
            </div>
        </section>

        <!-- ARTIST WORKS SHOWCASE -->
        <section class="gallery-section">
            <h2 class="sub-heading" style="color: var(--text-main);">Selected Works</h2>
            <div class="gallery-grid">
                <div class="gallery-item">
                    <img src="picture_red04.jpg" alt="Artist Work 1">
                </div>
                <div class="gallery-item">
                    <img src="picture_red05.jpg" alt="Artist Work 2">
                </div>
            </div>
        </section>

        <!-- BACK BUTTON -->
        <div style="text-align: center; margin-top: 60px;">
            <a href="index.html" class="cta-button">← Back to Homepage</a>
        </div>

    </main>

    <script src="script.js"></script>
</body>
</html>
